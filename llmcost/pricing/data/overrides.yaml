# Manual overrides — highest priority over all sources.
# Supported fields: input_per_mtok, output_per_mtok, cache_read_per_mtok, direct_id, notes
# Prices in USD per million tokens.
# create: true — inserts a new record when no fetched record exists for this id.

# ── Alibaba Cloud DashScope / Qwen (International / Singapore region) ─────────
# Source: https://www.alibabacloud.com/help/en/model-studio/model-pricing
# Tiered pricing: using lowest tier as representative (typical agent call length).
# qwen3-max tiers: ≤32K $1.2/$6, 32K-128K $2.4/$12, >128K $3/$15
# qwen3.5-plus tiers: ≤256K $0.4/$2.4, >256K $0.5/$3
# qwen-plus tiers: ≤256K $0.4/$1.2 (non-thinking), $0.4/$4 (thinking)
# qwen3.5-flash: flat $0.1/$0.4
# qwen-flash tiers: ≤256K $0.05/$0.4, >256K $0.25/$2
# qwen-turbo: flat $0.05/$0.2 (non-thinking)

- id: "dashscope/qwen3-max"
  create: true
  name: "Qwen3-Max"
  provider: "dashscope"
  direct_id: "qwen3-max"
  input_per_mtok: 1.2
  output_per_mtok: 6.0
  context_length: 258048
  max_output_tokens: 32768

